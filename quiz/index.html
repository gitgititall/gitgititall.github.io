<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
  <style>
    body { background: #111; color: #eee; font-family: Arial, sans-serif; }
    h1 { font-size: 2rem; letter-spacing: 2px; color: #fff; }

    /* Home screen */
    #home { max-width: 480px; margin: 60px auto; text-align: center; }
    .quiz-btn {
      display: block; width: 100%; margin-bottom: 12px;
      padding: 14px; font-size: 1.1rem;
      background: #222; color: #eee; border: 1px solid #444;
      border-radius: 6px; cursor: pointer; transition: background 0.15s;
    }
    .quiz-btn:hover { background: #333; }

    /* Quiz screen */
    #quiz { max-width: 600px; margin: 40px auto; display: none; }
    #progress-bar-wrap { background: #333; border-radius: 4px; height: 6px; margin-bottom: 24px; }
    #progress-bar { height: 6px; background: #0af; border-radius: 4px; transition: width 0.3s; }
    #question-meta { color: #888; font-size: 0.85rem; margin-bottom: 8px; }
    #question-text { font-size: 1.3rem; margin-bottom: 24px; line-height: 1.5; }
    .opt-btn {
      display: block; width: 100%; margin-bottom: 10px;
      padding: 12px 16px; text-align: left; font-size: 1rem;
      background: #1e1e1e; color: #eee; border: 1px solid #444;
      border-radius: 6px; cursor: pointer; transition: background 0.15s;
    }
    .opt-btn:hover:not(:disabled) { background: #2a2a2a; }
    .opt-btn.correct  { background: #1a4a1a; border-color: #2d8a2d; color: #8eff8e; }
    .opt-btn.wrong    { background: #4a1a1a; border-color: #8a2d2d; color: #ff9090; }
    .opt-btn.reveal   { background: #1a4a1a; border-color: #2d8a2d; color: #8eff8e; }
    .opt-btn:disabled { cursor: default; }
    #feedback { min-height: 28px; margin: 12px 0; font-size: 0.95rem; }
    #next-btn {
      display: none; margin-top: 8px; padding: 10px 28px;
      background: #0af; color: #000; border: none; border-radius: 6px;
      font-size: 1rem; cursor: pointer; font-weight: bold;
    }
    #next-btn:hover { background: #09d; }

    /* Results screen */
    #results { max-width: 480px; margin: 60px auto; text-align: center; display: none; }
    #score-display { font-size: 3rem; font-weight: bold; color: #0af; margin: 16px 0; }
    #score-label { font-size: 1.1rem; color: #aaa; margin-bottom: 32px; }
    .result-summary { text-align: left; margin-bottom: 32px; }
    .result-item { padding: 10px 14px; border-radius: 6px; margin-bottom: 8px; font-size: 0.9rem; }
    .result-item.r-correct { background: #1a3a1a; border-left: 3px solid #2d8a2d; }
    .result-item.r-wrong   { background: #3a1a1a; border-left: 3px solid #8a2d2d; }
    .result-item .ans-label { color: #888; font-size: 0.8rem; }
    .action-btn {
      padding: 12px 28px; font-size: 1rem; border: none; border-radius: 6px;
      cursor: pointer; font-weight: bold; margin: 6px;
    }
    #retry-btn { background: #0af; color: #000; }
    #retry-btn:hover { background: #09d; }
    #home-btn { background: #333; color: #eee; }
    #home-btn:hover { background: #444; }
  </style>
</head>
<body>

<!-- HOME -->
<div id="home">
  <h1>Quiz</h1>
  <p style="color:#888; margin-bottom:32px;">Pick a topic to begin</p>
  <div id="topic-list"></div>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
  <div id="question-meta"></div>
  <div id="question-text"></div>
  <div id="options"></div>
  <div id="feedback"></div>
  <button id="next-btn">Next &rarr;</button>
</div>

<!-- RESULTS -->
<div id="results">
  <h1>Results</h1>
  <div id="score-display"></div>
  <div id="score-label"></div>
  <div id="result-summary" class="result-summary"></div>
  <button id="retry-btn" class="action-btn">Retry</button>
  <button id="home-btn" class="action-btn">All Topics</button>
</div>

<script src="data.js"></script>
<script>
(function () {
  var state = { topic: null, questions: [], idx: 0, score: 0, history: [] };

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function show(id) {
    ['home','quiz','results'].forEach(function(s) {
      document.getElementById(s).style.display = (s === id) ? 'block' : 'none';
    });
  }

  // --- Home ---
  function buildHome() {
    var list = document.getElementById('topic-list');
    list.innerHTML = '';
    Object.keys(quizzes).forEach(function(topic) {
      var btn = document.createElement('button');
      btn.className = 'quiz-btn';
      btn.textContent = topic + '  (' + quizzes[topic].length + ' questions)';
      btn.onclick = function() { startQuiz(topic); };
      list.appendChild(btn);
    });
    show('home');
  }

  // --- Quiz ---
  function startQuiz(topic) {
    state.topic = topic;
    state.questions = shuffle(quizzes[topic]);
    state.idx = 0;
    state.score = 0;
    state.history = [];
    show('quiz');
    renderQuestion();
  }

  function renderQuestion() {
    var q = state.questions[state.idx];
    var total = state.questions.length;

    document.getElementById('progress-bar').style.width = (state.idx / total * 100) + '%';
    document.getElementById('question-meta').textContent = 'Question ' + (state.idx + 1) + ' of ' + total + '  |  ' + state.topic;
    document.getElementById('question-text').textContent = q.q;
    document.getElementById('feedback').textContent = '';
    document.getElementById('next-btn').style.display = 'none';

    // Build shuffled option indices so correct answer position changes
    var indices = [0,1,2,3];
    var shuffled = shuffle(indices);
    var correctShuffledPos = shuffled.indexOf(q.a);

    var opts = document.getElementById('options');
    opts.innerHTML = '';
    shuffled.forEach(function(origIdx, pos) {
      var btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = q.opts[origIdx];
      btn.dataset.pos = pos;
      btn.dataset.correct = (pos === correctShuffledPos) ? '1' : '0';
      btn.dataset.correctPos = correctShuffledPos;
      btn.onclick = function() { pick(this, q); };
      opts.appendChild(btn);
    });
  }

  function pick(btn, q) {
    var allBtns = document.querySelectorAll('.opt-btn');
    allBtns.forEach(function(b) { b.disabled = true; });

    var isCorrect = btn.dataset.correct === '1';
    var correctPos = parseInt(btn.dataset.correctPos);

    btn.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) {
      allBtns[correctPos].classList.add('reveal');
    }

    if (isCorrect) {
      state.score++;
      document.getElementById('feedback').innerHTML = '<span style="color:#8eff8e">&#10003; Correct!</span>';
    } else {
      document.getElementById('feedback').innerHTML = '<span style="color:#ff9090">&#10007; Incorrect &mdash; the right answer is highlighted above.</span>';
    }

    state.history.push({ q: q.q, chosen: btn.textContent, correct: allBtns[correctPos].textContent, ok: isCorrect });
    document.getElementById('next-btn').style.display = 'inline-block';
  }

  document.getElementById('next-btn').onclick = function() {
    state.idx++;
    if (state.idx < state.questions.length) {
      renderQuestion();
    } else {
      showResults();
    }
  };

  // --- Results ---
  function showResults() {
    var total = state.questions.length;
    var pct = Math.round(state.score / total * 100);
    document.getElementById('score-display').textContent = state.score + ' / ' + total;
    document.getElementById('score-label').textContent = pct + '%  &mdash;  ' + grade(pct);

    var summary = document.getElementById('result-summary');
    summary.innerHTML = '';
    state.history.forEach(function(h) {
      var div = document.createElement('div');
      div.className = 'result-item ' + (h.ok ? 'r-correct' : 'r-wrong');
      div.innerHTML = '<div>' + h.q + '</div>'
        + '<div class="ans-label">Your answer: ' + h.chosen + (h.ok ? '' : ' &nbsp;&bull;&nbsp; Correct: ' + h.correct) + '</div>';
      summary.appendChild(div);
    });

    show('results');
    document.getElementById('progress-bar').style.width = '100%';
  }

  function grade(pct) {
    if (pct === 100) return 'Perfect!';
    if (pct >= 80)  return 'Great job';
    if (pct >= 60)  return 'Not bad';
    if (pct >= 40)  return 'Keep studying';
    return 'Need more practice';
  }

  document.getElementById('retry-btn').onclick = function() { startQuiz(state.topic); };
  document.getElementById('home-btn').onclick = buildHome;

  buildHome();
})();
</script>
</body>
</html>
